{% extends "base.html" %}
{% load static %}

{% block title %}Página não encontrada — TechStore{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/erros.css' %}">
{% endblock %}

{% block content %}
<div class="erro-wrapper">
  <div class="erro-card">
    <div class="erro-card__codigo">404</div>
    <h1 class="erro-card__titulo">Página não encontrada</h1>
    <p class="erro-card__texto">
      O endereço que você acessou não existe ou foi removido.
    </p>
    <div class="erro-card__acoes">
      <a href="{% url 'home' %}" class="btn btn--primary btn--lg">Voltar para home</a>
      <a href="{% url 'produtos' %}" class="btn btn--outline btn--lg">Ver produtos</a>
    </div>
  </div>
</div>
{% endblock %}
