{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DigitalHub{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body>

{% if messages %}
<div class="mensagens-globais">
  {% for message in messages %}
  <div class="mensagem mensagem--{{ message.tags }}">
    <span>{{ message }}</span>
    <button class="mensagem__fechar" onclick="this.parentElement.remove()">✕</button>
  </div>
  {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

{% if request.resolver_match.url_name != 'home' %}
<a href="{% url 'home' %}" class="btn-home">Início</a>
{% endif %}

</body>
</html>
